name: Auto Generate Changelog with DeepSeek

# 手动触发，支持输入三个自定义参数
on:
  workflow_dispatch:
    inputs:
      main_version:
        description: '主版本号(如 1、2)'
        required: true
        type: string
      sub_version:
        description: '次/完整版本号(如 1.2.3、v1.2.3)'
        required: true
        type: string
      current_tag:
        description: '当前Git Tag名称(用于对比上个Tag)'
        required: true
        type: string

jobs:
  build-changelog:
    runs-on: ubuntu-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 拉取全量历史，用于对比Tag日志

      - name: 设置Python环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 获取上个Tag & 生成Commit差异日志
        id: get_commit_log
        run: |
          # 获取最近两个Tag，对比区间
          git tag --sort=v:refname > tag_list.txt
          # 取上一个Tag（简单相邻对比，适配常规发布流）
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          echo "prev_tag=$PREV_TAG" >> $GITHUB_OUTPUT
          # 生成两个Tag之间的commit原始日志
          if [ -n "$PREV_TAG" ]; then
            git log $PREV_TAG..${{ github.event.inputs.current_tag }} --pretty="- %s (%h)" > commit_diff.txt
          else
            git log --pretty="- %s (%h)" > commit_diff.txt
          fi

      - name: 调用DeepSeek生成Changelog并写入App.md
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_API_ENDPOINT: ${{ secrets.DEEPSEEK_API_ENDPOINT || 'https://api.deepseek.com/v1/chat/completions' }}
          MAIN_VERSION: ${{ github.event.inputs.main_version }}
          SUB_VERSION: ${{ github.event.inputs.sub_version }}
          CURRENT_TAG: ${{ github.event.inputs.current_tag }}
        run: |
          python3 .github/scripts/gen_changelog.py

      - name: 提交&推送Changelog文件
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add doc/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: auto generate changelog for ${CURRENT_TAG}" && git push)