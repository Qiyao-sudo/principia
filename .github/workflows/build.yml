name: Build and Release
on:
  workflow_dispatch:
    inputs:
      release_tag:
        required: true
        type: string
        description: еҸ‘еёғж Үзӯҫ-зүҲжң¬еҸ·
      release_version:
        required: true
        type: string
        description: еҸ‘еёғзүҲжң¬еҸ·
      primary_version:
        required: true
        type: string
        description: еӨ§зүҲжң¬еҸ·
      is_test_mode:
        required: false
        default: false
        type: boolean
jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-latest
            platform: linux
            arch: arm64
          # macOS
          - os: macos-15
            platform: macos
            arch: x64
          - os: macos-15
            platform: macos
            arch: arm64
          # Windows
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-latest
            platform: windows
            arch: x86
          - os: windows-latest
            platform: windows
            arch: arm64
    steps:
      - uses: actions/checkout@v4
      # ==========================
      # Python зҺҜеўғпјҲеҺҹйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: и®ҫзҪ® Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          architecture: ${{ matrix.arch == 'x86' && 'x86' || 'x64' }}
      - name: е®үиЈ…дҫқиө–
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          cd principia
          pip install -r requirements.txt
        shell: bash
      # ==========================
      # жһ„е»ә Python еҗҺз«ҜпјҲеҺҹйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: жһ„е»ә Python еҗҺз«Ҝ
        run: |
          cd principia
          # Linux arm64 дәӨеҸүзј–иҜ‘
          if [ "${{ matrix.platform }}" = "linux" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch aarch64
          # Windows arm64 дәӨеҸүзј–иҜ‘
          elif [ "${{ matrix.platform }}" = "windows" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # macOS arm64 дәӨеҸүзј–иҜ‘
          elif [ "${{ matrix.platform }}" = "macos" ] && [ "${{ matrix.arch }}" = "arm64" ]; then
            pyinstaller --onefile --name app app.py --distpath electron --target-arch arm64
          # жҷ®йҖҡ x64/x86
          else
            pyinstaller --onefile --name app app.py --distpath electron
          fi
        shell: bash
      # ==========================
      # Node.js + ElectronпјҲеҺҹйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: и®ҫзҪ® Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: е®үиЈ… Node дҫқиө–
        run: cd principia && npm install
        shell: bash
      - name: и®ҫзҪ®зүҲжң¬еҸ·
        run: |
          cd principia
          node -e "const fs=require('fs');const p=JSON.parse(fs.readFileSync('package.json'));p.version='${{ inputs.release_version }}';fs.writeFileSync('package.json',JSON.stringify(p,null,2));"
        shell: bash
      - name: жһ„е»әеүҚз«Ҝ
        run: cd principia && npm run build
        shell: bash
      # ==========================
      # и·Ёжһ¶жһ„жһ„е»әElectronпјҲеҺҹйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: жһ„е»ә Electron еә”з”Ё
        run: |
          cd principia
          if [ "${{ matrix.platform }}" = "windows" ]; then
            if [ "${{ matrix.arch }}" = "x86" ]; then
              npm run electron:build -- --ia32
            else
              npm run electron:build -- --${{ matrix.arch }}
            fi
          else
            npm run electron:build -- --${{ matrix.arch }}
          fi
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      # ==========================
      # еҺӢзј©жңӘжү“еҢ…ж–Үд»¶еӨ№пјҲеҺҹйҖ»иҫ‘е®Ңе…Ёдҝқз•ҷпјҢж— д»»дҪ•дҝ®ж”№пјү
      # ==========================
      - name: еҺӢзј©жңӘжү“еҢ…ж–Үд»¶еӨ№
        run: |
          cd principia/dist-electron
          if ls *-unpacked 1> /dev/null 2>&1; then
            tar -czf ../principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked.tar.gz *-unpacked/**
          else
            echo "::warning::жңӘжүҫеҲ°жңӘжү“еҢ…ж–Үд»¶еӨ№пјҢи·іиҝҮеҺӢзј©"
          fi
        shell: bash
      # ==========================
      # гҖҗжңҖз»ҲеҪ»еә•дҝ®еӨҚгҖ‘еҺӢзј©еҸҜжү§иЎҢж–Үд»¶/е®үиЈ…еҢ…пјҲи§ЈеҶіз©әж ј+йҖҡй…Қз¬Ұ+и·Ёе№іеҸ°й—®йўҳпјү
      # ==========================
      - name: еҺӢзј©еҸҜжү§иЎҢж–Үд»¶/е®үиЈ…еҢ…
        run: |
          set -euo pipefail
          TARGET_DIR="principia/dist-electron"
          # зӣ®еҪ•дёҚеӯҳеңЁзӣҙжҺҘи·іиҝҮ
          if [ ! -d "$TARGET_DIR" ]; then
            echo "::warning::зӣ®еҪ• $TARGET_DIR дёҚеӯҳеңЁпјҢи·іиҝҮеҸҜжү§иЎҢж–Үд»¶еҺӢзј©"
            exit 0
          fi
          cd "$TARGET_DIR"
          # е…ій”®пјҡз”Ё-print0иҫ“еҮәnullеҲҶйҡ”зҡ„ж–Үд»¶еҲ—иЎЁпјҢfindеҲӨж–ӯжҳҜеҗҰжңүж–Үд»¶
          if find . -maxdepth 1 -type f \
            \( -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.app" \) \
            -not -name "Principia Setup *.exe" -not -name "*.deb" -not -name "*.pkg" \
            -not -name "*.yml" -not -name "*.blockmap" -print0 | grep -qz .; then
            # ж ёеҝғпјҡxargs -0 дј йҖ’nullеҲҶйҡ”ж–Үд»¶пјҢtar -T - д»Һж ҮеҮҶиҫ“е…ҘиҜ»ж–Үд»¶пјҢе®ҢзҫҺж”ҜжҢҒз©әж ј
            find . -maxdepth 1 -type f \
              \( -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.app" \) \
              -not -name "Principia Setup *.exe" -not -name "*.deb" -not -name "*.pkg" \
              -not -name "*.yml" -not -name "*.blockmap" -print0 | xargs -0 tar -czf "../principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable.tar.gz" -T -
            echo "вң… еҸҜжү§иЎҢж–Үд»¶еҺӢзј©е®ҢжҲҗпјҲж”ҜжҢҒеёҰз©әж јж–Үд»¶еҗҚпјү"
            # еҸҜйҖүпјҡжү“еҚ°жү“еҢ…зҡ„ж–Үд»¶еҲ—иЎЁпјҢдҫҝдәҺжҺ’жҹҘ
            echo "рҹ”Қ жү“еҢ…зҡ„ж–Үд»¶пјҡ"
            find . -maxdepth 1 -type f \
              \( -name "*.exe" -o -name "*.AppImage" -o -name "*.dmg" -o -name "*.app" \) \
              -not -name "Principia Setup *.exe" -not -name "*.deb" -not -name "*.pkg" \
              -not -name "*.yml" -not -name "*.blockmap"
          else
            echo "::warning::вқҢ еңЁ $TARGET_DIR жңӘжүҫеҲ°еҸҜжү§иЎҢж–Үд»¶/е®үиЈ…еҢ…пјҢи·іиҝҮеҺӢзј©"
            echo "рҹ“Ӯ зӣ®еҪ•дёӢзҺ°жңүж–Үд»¶пјҡ"
            ls -la
          fi
        shell: bash


      # ==========================
      # дёҠдј 1пјҡunpackedеҺӢзј©еҢ…пјҲеҺҹйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: дёҠдј  и§ЈеҺӢж–Үд»¶еӨ№
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked
          path: principia/principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-unpacked.tar.gz
          if-no-files-found: warn
      # ==========================
      # дёҠдј 2пјҡеҸҜжү§иЎҢж–Үд»¶еҺӢзј©еҢ…пјҲеҺҹж–°еўһйҖ»иҫ‘дёҚеҸҳпјү
      # ==========================
      - name: дёҠдј  еҸҜжү§иЎҢж–Үд»¶еҺӢзј©еҢ…
        uses: actions/upload-artifact@v4
        with:
          name: principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable
          path: principia/principia-${{ inputs.release_version }}-${{ matrix.platform }}-${{ matrix.arch }}-executable.tar.gz
          if-no-files-found: warn
  release:
    needs: build
    if: ${{ inputs.is_test_mode == false }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: иҜ»еҸ– ChangeLog
        id: changelog
        run: |
          body=$(cat doc/ChangeLogs/${{ inputs.primary_version }}/${{ inputs.release_version }}/App.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$body" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        shell: bash
      - name: дёӢиҪҪжүҖжңүжһ„е»әдә§зү©
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: еҸ‘еёғ GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.release_tag }}
          name: Release v${{ inputs.release_version }}
          body: ${{ steps.changelog.outputs.body }}
          files: |
            artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
