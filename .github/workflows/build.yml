name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd principia
        pip install -r requirements.txt

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd principia
        pip install -r requirements.txt

    - name: Build backend
      run: |
        cd principia
        pyinstaller --onefile --name app app.py --distpath electron
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Get version from package.json
      id: get-version
      run: |
        cd principia
        VERSION=$(node -p "require('./package.json').version")
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Install Node.js dependencies
      run: |
        cd principia
        npm install

    - name: Build frontend
      run: |
        cd principia
        npm run build

    - name: Build Electron app
      run: |
        cd principia
        npm run electron:build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create unpacked zip
      run: |
        cd principia/dist-electron
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          7z a "Principia-${{ matrix.os }}-${{ steps.get-version.outputs.version }}-unpacked.zip" "win-unpacked"
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          zip -r "Principia-${{ matrix.os }}-${{ steps.get-version.outputs.version }}-unpacked.zip" "mac-unpacked"
        else
          zip -r "Principia-${{ matrix.os }}-${{ steps.get-version.outputs.version }}-unpacked.zip" "linux-unpacked"
        fi
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: principia-${{ matrix.os }}
        path: principia/dist-electron
