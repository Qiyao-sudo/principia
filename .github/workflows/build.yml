name: Build and Test

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.3.0)'
        required: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        cd principia
        pip install -r requirements.txt

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        cd principia
        pip install -r requirements.txt

    - name: Build backend
      run: |
        cd principia
        pyinstaller --onefile --name app app.py --distpath electron
      shell: bash

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Node.js dependencies
      run: |
        cd principia
        npm install

    - name: Build frontend
      run: |
        cd principia
        npm run build

    - name: Build Electron app
      run: |
        cd principia
        npm run electron:build
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create unpacked zip
      run: |
        cd principia/dist-electron
        VERSION=${{ github.event.inputs.version || '1.3.0' }}
        if [ "${{ matrix.os }}" == "windows-latest" ]; then
          7z a "Principia-${{ matrix.os }}-$VERSION-unpacked.zip" "win-unpacked"
        elif [ "${{ matrix.os }}" == "macos-latest" ]; then
          zip -r "Principia-${{ matrix.os }}-$VERSION-unpacked.zip" "mac-unpacked"
        else
          zip -r "Principia-${{ matrix.os }}-$VERSION-unpacked.zip" "linux-unpacked"
        fi
      shell: bash

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: principia-${{ matrix.os }}
        path: principia/dist-electron

    - name: Create GitHub Release
      if: github.event_name == 'workflow_dispatch'
      uses: actions/github-script@v6
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const version = '${{ github.event.inputs.version }}';
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          
          await github.rest.repos.createRelease({
            owner: context.repo.owner,
            repo: context.repo.repo,
            tag_name: `v${version}`,
            name: `Release v${version}`,
            body: changelog,
            draft: false,
            prerelease: false
          });
